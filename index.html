<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>ROSC — Back Soon</title>

<meta name="description" content="ROSC is on a brief pause. We'll be back shortly with workforce reality, measured." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://rosc-survey.vercel.app/" />
<meta property="og:title" content="ROSC — Back Soon" />
<meta property="og:description" content="Workforce reality, measured. Brief pause — back shortly." />
<meta property="og:image" content="https://rosc-survey.vercel.app/rosc-preview.png" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="theme-color" content="#0D0B08" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: radial-gradient(ellipse at top, #1A140A 0%, #0D0B08 60%);
    color: #E8E2D5;
    font-family: 'IBM Plex Mono', sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding: 48px 24px;
    text-align: center;
  }

  .top-mark {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: 0.42em;
    color: #B8922A;
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 0 16px;
  }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: #B8922A;
    margin-bottom: 28px;
  }

  .display {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 64px;
    line-height: 1.05;
    letter-spacing: -0.01em;
    color: #E8E2D5;
    margin-bottom: 16px;
    max-width: 600px;
  }
  .display em {
    font-style: italic;
    color: #B8922A;
  }

  .gold-rule {
    width: 80px;
    height: 1px;
    background: #B8922A;
    margin: 28px auto;
  }

  .sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 22px;
    line-height: 1.5;
    color: #C8C0B0;
    max-width: 480px;
    margin-bottom: 36px;
  }

  .actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 8px;
  }

  .btn {
    border: 1px solid #B8922A;
    color: #B8922A;
    background: transparent;
    text-decoration: none;
    padding: 14px 28px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    transition: all 0.15s;
    cursor: pointer;
  }
  .btn:hover {
    background: rgba(184,146,42,0.1);
  }
  .btn-primary {
    background: #B8922A;
    color: #0D0B08;
  }
  .btn-primary:hover {
    background: #D4B156;
    color: #0D0B08;
  }

  footer {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 0.42em;
    color: rgba(184,146,42,0.5);
    text-transform: uppercase;
  }

  @media (max-width: 600px) {
    .display { font-size: 44px; }
    .sub { font-size: 18px; }
    .top-mark { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="top-mark">R O S C</div>

<main>
  <div class="eyebrow">— Brief pause —</div>

  <div class="display">
    We'll be<br/>
    <em>right back.</em>
  </div>

  <div class="gold-rule"></div>

  <div class="sub">
    The survey is paused while we make a few improvements.<br/>
    Workforce reality is still being measured.
  </div>

  <div class="actions">
    <a class="btn btn-primary" href="https://instagram.com/rosc_official1" target="_blank" rel="noopener">Follow @rosc_official1</a>
  </div>
</main>

<footer>REVIVE · OPTIMIZE · SUSTAIN · COMMIT</footer>

</body>
</html>
